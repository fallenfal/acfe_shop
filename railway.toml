# Railway — Docker build (Node + Python). See DEPLOY_RAILWAY.md
# Railway uses the Dockerfile when present; Railpack buildCommand is not used.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
preDeployCommand = "python manage.py migrate && python manage.py bootstrap_demo"
# Overrides dashboard "gunicorn ... $PORT" — script expands PORT in a shell (no $PORT in this string)
startCommand = "/app/bin/start.sh"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
