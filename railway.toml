# Railway — Docker build (Node + Python). See DEPLOY_RAILWAY.md
# Railway uses the Dockerfile when present; Railpack buildCommand is not used.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
preDeployCommand = "python manage.py migrate && python manage.py bootstrap_demo"
startCommand = "gunicorn acfe_shop.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
